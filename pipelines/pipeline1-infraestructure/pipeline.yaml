trigger: none

pool:
  vmImage: ubuntu-latest

variables:
  azureServiceConnection: "YOUR-SERVICE-CONNECTION-NAME"
  terraformWorkingDirectory: "$(System.DefaultWorkingDirectory)/terraform/pipeline1-infrastructure"

steps:
  - checkout: self

  - task: AzureCLI@2
    displayName: Terraform init, plan, apply
    inputs:
      azureSubscription: "$(azureServiceConnection)"
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        cd "$(terraformWorkingDirectory)"
        terraform init
        terraform validate
        terraform plan
        terraform apply -auto-approve