trigger:
  branches:
    include:
      - main

  paths:
    include:
      - backend/*
      - pipelines/pipeline2-build/**

pool:
  vmImage: ubuntu-latest

variables:
  azureServiceConnection: "azureDevOpsConnection"
  acrName: "acrtaskmanagerdev04s2uz"
  acrLoginServer: "acrtaskmanagerdev04s2uz.azurecr.io"
  imageRepository: "taskmanager-backend"
  dockerfilePath: "$(Build.SourcesDirectory)/backend/Dockerfile"
  buildContext: "$(Build.SourcesDirectory)/backend"

stages:
  - stage: BuildAndPush
    displayName: Build and push backend image
    jobs:
      - job: BuildBackendImage
        displayName: Build and push backend image
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: Login to Azure Container Registry
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -e

                echo "Logging in to ACR"
                az acr login --name "$(acrName)"

                SHORT_SHA=$(echo "$(Build.SourceVersion)" | cut -c1-7)

                IMAGE_SHA="$(acrLoginServer)/$(imageRepository):$SHORT_SHA"
                IMAGE_LATEST="$(acrLoginServer)/$(imageRepository):latest"

                echo "Building Docker image"
                docker build -f "$(dockerfilePath)" -t "$IMAGE_SHA" -t "$IMAGE_LATEST" "$(buildContext)"

                echo "Pushing Docker image"
                docker push "$IMAGE_SHA"
                docker push "$IMAGE_LATEST"

                echo "Image pushed successfully"
                echo "$IMAGE_SHA"
                echo "$IMAGE_LATEST"

                echo "##vso[task.setvariable variable=imageTag;isOutput=true]$SHORT_SHA"