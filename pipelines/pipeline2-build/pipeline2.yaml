trigger:
  branches:
    include:
      - main

  paths:
    include:
      - backend/*
      - frontend/*
      - pipelines/pipeline2-build/**

pool:
  vmImage: ubuntu-latest

variables:
  azureServiceConnection: "azureDevOpsConnection"
  acrName: "acrtaskmanagerdev04s2uz"
  acrLoginServer: "acrtaskmanagerdev04s2uz.azurecr.io"
  backendImageRepository: "taskmanager-backend"
  frontendImageRepository: "taskmanager-frontend"

stages:
  - stage: BuildAndPush
    displayName: Build and push backend and frontend images
    jobs:
      - job: BuildAndPushImages
        displayName: Build and push backend and frontend images
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: Login to Azure Container Registry
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                echo "Logging in to ACR"
                az acr login --name "$(acrName)"

                SHORT_SHA="$(Build.SourceVersion)"
                SHORT_SHA="${SHORT_SHA:0:7}"

                BACKEND_IMAGE="$(acrLoginServer)/$(backendImageRepository):$SHORT_SHA"
                BACKEND_LATEST="$(acrLoginServer)/$(backendImageRepository):latest"

                FRONTEND_IMAGE="$(acrLoginServer)/$(frontendImageRepository):$SHORT_SHA"
                FRONTEND_LATEST="$(acrLoginServer)/$(frontendImageRepository):latest"

                echo "Building backend image"
                docker build \
                  -f "$(Build.SourcesDirectory)/backend/Dockerfile" \
                  -t "$BACKEND_IMAGE" \
                  -t "$BACKEND_LATEST" \
                  "$(Build.SourcesDirectory)/backend"

                echo "Building frontend image"
                docker build \
                  -f "$(Build.SourcesDirectory)/frontend/Dockerfile" \
                  -t "$FRONTEND_IMAGE" \
                  -t "$FRONTEND_LATEST" \
                  "$(Build.SourcesDirectory)/frontend"

                echo "Pushing backend image"
                docker push "$BACKEND_IMAGE"
                docker push "$BACKEND_LATEST"

                echo "Pushing frontend image"
                docker push "$FRONTEND_IMAGE"
                docker push "$FRONTEND_LATEST"

                echo "Images pushed successfully"
                echo "$BACKEND_IMAGE"
                echo "$FRONTEND_IMAGE"

                echo "##vso[task.setvariable variable=imageTag;isOutput=true]$SHORT_SHA"