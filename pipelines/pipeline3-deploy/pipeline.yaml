trigger:
  branches:
    include:
      - main
  paths:
    include:
      - pipelines/pipeline3-deploy/**

pool:
  vmImage: ubuntu-latest

variables:
  azureServiceConnection: "azureDevOpsConnection"
  terraformWorkingDirectory: "$(System.DefaultWorkingDirectory)/terraform/pipeline1-infrastructure"
  acrLoginServer: "acrtaskmanagerdev04s2uz.azurecr.io"
  backendImageTag: "latest"
  frontendImageTag: "latest"
  terraformVersion: "1.9.0"

stages:
  - stage: Deploy
    displayName: "Deploy backend and frontend containers"
    jobs:
      - job: TerraformDeploy
        displayName: "Terraform apply container image updates"
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: "Run Terraform to update ACI images"
            inputs:
              azureSubscription: "$(azureServiceConnection)"
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                set -euo pipefail

                echo "Installing Terraform $(terraformVersion)"
                TF_INSTALL_DIR=$(mktemp -d)
                curl -sLo "$TF_INSTALL_DIR/terraform.zip" "https://releases.hashicorp.com/terraform/$(terraformVersion)/terraform_$(terraformVersion)_linux_amd64.zip"
                unzip -o "$TF_INSTALL_DIR/terraform.zip" -d "$TF_INSTALL_DIR"
                sudo mv "$TF_INSTALL_DIR/terraform" /usr/local/bin/terraform
                rm -rf "$TF_INSTALL_DIR"
                terraform -version

                cd "$(terraformWorkingDirectory)"

                BACKEND_IMAGE="$(acrLoginServer)/taskmanager-backend:$(backendImageTag)"
                FRONTEND_IMAGE="$(acrLoginServer)/taskmanager-frontend:$(frontendImageTag)"

                echo "Backend image: $BACKEND_IMAGE"
                echo "Frontend image: $FRONTEND_IMAGE"

                terraform init
                terraform validate
                terraform plan \
                  -var="backend_container_image=$BACKEND_IMAGE" \
                  -var="frontend_container_image=$FRONTEND_IMAGE" \
                  -out=tfplan
                terraform apply -auto-approve tfplan